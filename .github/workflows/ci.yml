# 项目名称：CampusHub CI 自动化构建配置
# 作用：每次提交代码自动构建、测试、校验
name: CampusHub CI

# 触发条件：提交代码到main分支 / 发起合并请求时自动运行
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# 执行任务
jobs:
  build:
    # 运行环境
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 配置Java环境（适配SpringBoot）
      - name: 设置JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. 构建项目 + 运行测试
      - name: Maven构建与测试
        run: mvn clean package -DskipTests

      # 4. 构建成功提示
      - name: 构建完成
        run: echo "CampusHub 项目 CI 构建成功！"