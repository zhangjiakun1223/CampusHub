name: CampusHub CI

# 触发条件：main 分支提交 / 合并请求
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# 执行任务
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码（更新至 v5 版本，解决 Node.js 警告）
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      # 2. 配置 JDK 17（更新至 v5 版本，解决警告）
      - name: 设置 JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Maven 编译检查（适配当前空项目，仅做编译校验）
      - name: Maven 编译与校验
        run: mvn clean compile

      # 4. 构建成功提示
      - name: 构建完成
        run: echo "✅ CampusHub 项目 CI 构建成功！"